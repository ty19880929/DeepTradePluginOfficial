plugin_id: limit-up-board
name: 打板策略
version: 0.6.7
type: strategy
api_version: "1"
entrypoint: limit_up_board.plugin:LimitUpBoardPlugin
description: A 股打板策略：双轮 LLM 漏斗（强势初筛 → 连板预测）
author: DeepTrade

# v0.4.0 框架起：插件自行声明非框架自带的运行时依赖（PEP 508）。
# 框架在 install / upgrade 阶段会先 `uv pip install` 这里列出的包再进入
# migrations / validate_static。见 plugin_required_dependencies.md。
dependencies:
  - "tushare>=1.4"
  - "pandas>=2.2,<3"
  - "pyarrow>=15"
  - "numpy>=1.26,<3"
  - "lightgbm>=4.3,<5"
  - "scikit-learn>=1.4,<2"

permissions:
  tushare_apis:
    required:
      - stock_basic
      - trade_cal
      - daily
      - daily_basic
      - stock_st
      - limit_list_d
      - limit_step
      - moneyflow
      - top_list
      - top_inst
      - cyq_perf
    optional:
      - limit_list_ths
      - limit_cpt_list
      - suspend_d
  llm: true
  llm_tools: false

migrations:
  - version: "20260509_001"
    file: migrations/20260509_001_init.sql
    checksum: "sha256:8f6bc721fedbd94f652fa356779eea7b4ef801483968dabfa6648cf2f639064f"
  - version: "20260601_001"
    file: migrations/20260601_001_lgb_tables.sql
    checksum: "sha256:56e3bbd9b678a953c1fbe4fbde6d54d65ff191a1e5a385a2e9ef889aec93826e"
  - version: "20260516_001"
    file: migrations/20260516_001_evidence_validation.sql
    checksum: "sha256:bcd0b1fecea014696539f09a8236d8f267c950b36e9a19f0f150162ab125c351"

# 框架 v0.4+ 会从 plugin_id 推导默认前缀（limit_up_board_），需显式声明 lub_ 以匹配实际表名。
table_prefix: lub_

tables:
  - name: lub_stock_basic
    description: stock_basic 落库（限本插件使用）
    purge_on_uninstall: true
  - name: lub_trade_cal
    description: trade_cal 落库
    purge_on_uninstall: true
  - name: lub_daily
    description: daily 行情落库
    purge_on_uninstall: true
  - name: lub_daily_basic
    description: daily_basic 行情指标落库
    purge_on_uninstall: true
  - name: lub_moneyflow
    description: moneyflow 资金流落库
    purge_on_uninstall: true
  - name: lub_limit_list_d
    description: 涨停明细缓存（limit_list_d）
    purge_on_uninstall: true
  - name: lub_limit_ths
    description: 同花顺涨停榜单缓存（limit_list_ths）
    purge_on_uninstall: true
  - name: lub_stage_results
    description: 策略各阶段（强势初筛/连板预测/全局重排/辩论修订）结构化结果
    purge_on_uninstall: true
  - name: lub_runs
    description: 本插件 run 历史（替代框架 strategy_runs）
    purge_on_uninstall: true
  - name: lub_events
    description: 本插件 run 事件流（替代框架 strategy_events）
    purge_on_uninstall: true
  - name: lub_top_list
    description: 龙虎榜个股明细（top_list）
    purge_on_uninstall: true
  - name: lub_top_inst
    description: 龙虎榜机构席位明细（top_inst）
    purge_on_uninstall: true
  - name: lub_cyq_perf
    description: 筹码每日指标（cyq_perf）
    purge_on_uninstall: true
  - name: lub_config
    description: 本插件用户可调设置（流通市值 下限/上限 + 股价上限）
    purge_on_uninstall: true
  - name: lub_lgb_models
    description: LightGBM 模型版本登记（v0.5+）
    purge_on_uninstall: true
  - name: lub_lgb_predictions
    description: 每次 run 的 LGB 推理结果审计（含特征摘要，便于复盘）
    purge_on_uninstall: true
