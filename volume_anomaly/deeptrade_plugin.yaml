plugin_id: volume-anomaly
name: 成交量异动策略
version: 0.8.2
type: strategy
api_version: "1"
entrypoint: volume_anomaly.plugin:VolumeAnomalyPlugin
description: 主板成交量异动筛选 + LLM 主升浪启动预测（screen / analyze / prune 三模式）
author: DeepTrade

# v0.4.0 框架起：插件自行声明非框架自带的运行时依赖（PEP 508）。
# 框架在 install / upgrade 阶段会先 `uv pip install` 这里列出的包再进入
# migrations / validate_static。见 plugin_required_dependencies.md。
dependencies:
  - "tushare>=1.4"
  - "pandas>=2.2,<3"
  - "lightgbm>=4.3,<5"
  - "scikit-learn>=1.4,<2"
  - "pyarrow>=14"

permissions:
  tushare_apis:
    required:
      - stock_basic
      - trade_cal
      - daily
      - daily_basic
      - stock_st
    optional:
      - suspend_d
      - moneyflow
      - limit_list_d
      - limit_cpt_list
      - top_list
      - anns_d
      - adj_factor
      - index_daily
  llm: true
  llm_tools: false

migrations:
  - version: "20260509_001"
    file: migrations/20260509_001_init.sql
    checksum: "sha256:2294b40337e3ac1695456dbbc51c5f6aaaf7b7d373202c099ec81b65755c44d0"
  - version: "20260601_001"
    file: migrations/20260601_001_lgb_tables.sql
    checksum: "sha256:6e338f369a8dca1f1ff8bffd6bc5e7f84c7345c33e87eb2e363b6f7d30355a33"
  - version: "20260601_002"
    file: migrations/20260601_002_va_config.sql
    checksum: "sha256:856d7ac3508510e3376b7f15a1be413edcc1714446b00e9c19e010e6d1666ca2"

tables:
  - name: va_watchlist
    description: 异动筛选后的待追踪标的池（每只一行，PK=ts_code）
    purge_on_uninstall: true
  - name: va_anomaly_history
    description: 历次异动筛选命中明细（审计用）
    purge_on_uninstall: true
  - name: va_stage_results
    description: 走势分析（LLM）阶段的结构化结果
    purge_on_uninstall: true
  - name: va_runs
    description: 本插件 run 历史（替代框架 strategy_runs）
    purge_on_uninstall: true
  - name: va_events
    description: 本插件 run 事件流（替代框架 strategy_events）
    purge_on_uninstall: true
  - name: va_realized_returns
    description: T+N 事后实际收益指标（PK=anomaly_date+ts_code）
    purge_on_uninstall: true
  - name: va_lgb_models
    description: LightGBM 模型版本登记（v0.7+）
    purge_on_uninstall: true
  - name: va_lgb_predictions
    description: 每次 analyze run 的 LGB 推理结果审计（含特征摘要，便于复盘）
    purge_on_uninstall: true
  - name: va_config
    description: 本插件用户可调设置（LGB 评分开关 / 标签阈值 / 标签源 等）
    purge_on_uninstall: true
